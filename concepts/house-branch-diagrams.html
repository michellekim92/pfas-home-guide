<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Branching PFAS Home Diagrams</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #e4e9e6;
      color: #1a2e28;
      padding: 1rem;
    }
    header { text-align: center; max-width: 600px; margin: 0 auto 1rem; }
    header h1 { font-family: 'Fraunces', serif; font-size: 1.35rem; }
    header p { font-size: 0.85rem; color: #5c7268; margin-top: 0.35rem; }
    .tabs {
      display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: center;
      margin-bottom: 1rem;
    }
    .tabs button {
      font: 600 0.72rem 'DM Sans', sans-serif;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      border: 2px solid #dce8e2;
      background: white;
      cursor: pointer;
    }
    .tabs button.active { background: #2d8a5e; color: white; border-color: #2d8a5e; }
    .phone-wrap { display: flex; justify-content: center; }
    .phone {
      width: 100%; max-width: 380px;
      background: #111;
      border-radius: 32px;
      padding: 10px;
      box-shadow: 0 24px 56px rgba(0,0,0,0.22);
    }
    .screen {
      background: #f8faf9;
      border-radius: 24px;
      overflow: hidden;
      min-height: 560px;
    }
    .screen-inner { padding: 0.85rem; }
    .screen h2 {
      font-family: 'Fraunces', serif;
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }
    .hint { font-size: 0.72rem; color: #5c7268; margin-bottom: 0.6rem; }
    .concept { display: none; }
    .concept.active { display: block; }
    .out-label {
      text-align: center;
      font-size: 0.78rem;
      color: #5c7268;
      margin: 0.4rem auto 1rem;
      max-width: 380px;
      line-height: 1.4;
    }
    .out-label strong { color: #1a2e28; }
    .diag-box {
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .diag-box svg { width: 100%; height: auto; display: block; }

    /* Node styles in SVG */
    .node-center { filter: drop-shadow(0 4px 12px rgba(45,138,94,0.35)); }
    .node-room { cursor: pointer; }
    .node-leaf { font-size: 8px; }
    .branch-line {
      fill: none;
      stroke-linecap: round;
    }

    /* 6 — Dark neon network */
    .neon-wrap {
      background: linear-gradient(160deg, #0f1f18 0%, #1a2e28 100%);
      padding: 0.5rem;
    }
    .neon-wrap .branch-line { stroke: rgba(100, 220, 160, 0.45); stroke-width: 1.5; }
    .neon-wrap .branch-line-2 { stroke: rgba(100, 220, 160, 0.25); stroke-width: 1; }

    /* 7 — Vertical tree scroll */
    .tree-scroll {
      max-height: 420px;
      overflow-y: auto;
      padding: 0.5rem;
      background: white;
      border: 1px solid #dce8e2;
      border-radius: 16px;
    }
    .tree-root {
      text-align: center;
      background: linear-gradient(135deg, #2d8a5e, #1f6b47);
      color: white;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.65rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }
    .tree-branch { margin-left: 0.75rem; border-left: 2px solid #c5ddd0; padding-left: 0.65rem; margin-bottom: 0.5rem; }
    .tree-room {
      font-weight: 700;
      font-size: 0.78rem;
      color: #1f6b47;
      margin-bottom: 0.35rem;
      display: flex; align-items: center; gap: 0.35rem;
    }
    .tree-leaf {
      font-size: 0.68rem;
      color: #5c7268;
      padding: 0.25rem 0;
      display: flex; align-items: center; gap: 0.35rem;
    }

    /* 8 — Interactive CSS nodes */
    .web-graph {
      position: relative;
      height: 400px;
      background: radial-gradient(circle at center, #eef6f1 0%, #f8faf9 70%);
      border: 1px solid #dce8e2;
      border-radius: 16px;
    }
    .wg-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 76px; height: 76px;
      border-radius: 50%;
      background: linear-gradient(145deg, #3aa06e, #1f6b47);
      color: white;
      font-family: 'Fraunces', serif;
      font-size: 0.62rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      line-height: 1.15;
      z-index: 5;
      box-shadow: 0 6px 20px rgba(45,138,94,0.4);
    }
    .wg-room {
      position: absolute;
      width: 58px;
      text-align: center;
      font-size: 0.58rem;
      font-weight: 700;
      z-index: 4;
    }
    .wg-room .bubble {
      width: 44px; height: 44px;
      margin: 0 auto 0.2rem;
      border-radius: 50%;
      background: white;
      border: 2px solid #2d8a5e;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .wg-leaf {
      position: absolute;
      font-size: 0.55rem;
      font-weight: 600;
      color: #5c7268;
      background: white;
      border: 1px solid #dce8e2;
      border-radius: 8px;
      padding: 0.2rem 0.35rem;
      white-space: nowrap;
      z-index: 3;
    }
    .wg-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    @media (min-width: 960px) {
      .tabs, #single-label { display: none; }
      #single-view { display: none; }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
        max-width: 860px;
        margin: 0 auto 2rem;
      }
    }
    @media (max-width: 959px) { .grid { display: none; } }
  </style>
</head>
<body>
  <header>
    <h1>5 branching web diagrams</h1>
    <p>Center node → rooms → product hotspots</p>
  </header>

  <nav class="tabs" id="tabs">
    <button class="active" data-c="6">6 · Neon web</button>
    <button data-c="7">7 · Vertical tree</button>
    <button data-c="8">8 · Force graph</button>
    <button data-c="9">9 · Mind map</button>
    <button data-c="10">10 · Sunburst</button>
  </nav>

  <p class="out-label" id="single-label"><strong>6 · Neon web</strong> — dark glowing node network</p>

  <div id="single-view" class="phone-wrap">
    <div class="phone"><div class="screen" id="screen"></div></div>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const DATA = {
      center: 'PFAS at home',
      rooms: [
        { id: 'bed', emoji: '🛏️', label: 'Bedroom', items: ['Bed sheets', 'Air quality', 'Mattress pads'] },
        { id: 'bath', emoji: '🧴', label: 'Bathroom', items: ['Skincare', 'Cleaners', 'Toilet paper', 'Floss'] },
        { id: 'kit', emoji: '🍳', label: 'Kitchen', items: ['Tap water', 'Non-stick pans', 'Canned food', 'Bottle seals'] },
        { id: 'closet', emoji: '👕', label: 'Wardrobe', items: ['Underwear', 'Athletic wear', 'Rain jackets'] },
      ],
    };

    const labels = {
      6: '<strong>6 · Neon web</strong> — dark glowing node network, sci-fi feel',
      7: '<strong>7 · Vertical tree</strong> — scrollable hierarchy, clearest on mobile',
      8: '<strong>8 · Force graph</strong> — nodes positioned like a connected web',
      9: '<strong>9 · Mind map</strong> — organic curved branches from center',
      10: '<strong>10 · Sunburst</strong> — radial rings, room → item layers',
    };

    // Concept 6: Neon SVG web
    function concept6() {
      return `
        <div class="screen-inner">
          <h2>PFAS hotspot web</h2>
          <p class="hint">Center → room → item nodes</p>
          <div class="diag-box neon-wrap">
            <svg viewBox="0 0 340 380">
              <defs>
                <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#4ade80"/>
                  <stop offset="100%" stop-color="#166534"/>
                </radialGradient>
                <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
              </defs>
              <!-- lines center to rooms -->
              <path class="branch-line" d="M170,190 L80,100"/>
              <path class="branch-line" d="M170,190 L260,100"/>
              <path class="branch-line" d="M170,190 L60,280"/>
              <path class="branch-line" d="M170,190 L280,280"/>
              <!-- lines rooms to leaves (sample) -->
              <path class="branch-line-2" d="M80,100 L40,60"/><path class="branch-line-2" d="M80,100 L100,55"/>
              <path class="branch-line-2" d="M260,100 L220,55"/><path class="branch-line-2" d="M260,100 L300,60"/>
              <path class="branch-line-2" d="M60,280 L25,320"/><path class="branch-line-2" d="M60,280 L90,330"/>
              <path class="branch-line-2" d="M280,280 L250,330"/><path class="branch-line-2" d="M280,280 L310,320"/>
              <!-- leaf nodes -->
              <circle cx="40" cy="60" r="22" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="40" y="58" fill="#a7f3d0" font-size="7" text-anchor="middle">sheets</text>
              <circle cx="100" cy="55" r="22" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="100" y="58" fill="#a7f3d0" font-size="7" text-anchor="middle">air</text>
              <circle cx="220" cy="55" r="22" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="220" y="55" fill="#a7f3d0" font-size="6" text-anchor="middle">skincare</text>
              <circle cx="300" cy="60" r="22" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="300" y="58" fill="#a7f3d0" font-size="6" text-anchor="middle">cleaners</text>
              <circle cx="25" cy="320" r="20" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="25" y="322" fill="#a7f3d0" font-size="6" text-anchor="middle">cotton</text>
              <circle cx="90" cy="330" r="20" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="90" y="332" fill="#a7f3d0" font-size="6" text-anchor="middle">athletic</text>
              <circle cx="250" cy="330" r="20" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="250" y="330" fill="#a7f3d0" font-size="6" text-anchor="middle">tap water</text>
              <circle cx="310" cy="320" r="20" fill="#1a3d2e" stroke="#4ade80" stroke-width="1.5"/>
              <text x="310" y="322" fill="#a7f3d0" font-size="6" text-anchor="middle">pans</text>
              <!-- room nodes -->
              <circle cx="80" cy="100" r="32" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
              <text x="80" y="96" fill="white" font-size="14" text-anchor="middle">🛏️</text>
              <text x="80" y="112" fill="#a7f3d0" font-size="8" font-weight="600" text-anchor="middle">Bedroom</text>
              <circle cx="260" cy="100" r="32" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
              <text x="260" y="96" fill="white" font-size="14" text-anchor="middle">🧴</text>
              <text x="260" y="112" fill="#a7f3d0" font-size="8" font-weight="600" text-anchor="middle">Bath</text>
              <circle cx="60" cy="280" r="32" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
              <text x="60" y="276" fill="white" font-size="14" text-anchor="middle">👕</text>
              <text x="60" y="292" fill="#a7f3d0" font-size="8" font-weight="600" text-anchor="middle">Wardrobe</text>
              <circle cx="280" cy="280" r="32" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
              <text x="280" y="276" fill="white" font-size="14" text-anchor="middle">🍳</text>
              <text x="280" y="292" fill="#a7f3d0" font-size="8" font-weight="600" text-anchor="middle">Kitchen</text>
              <!-- center -->
              <circle cx="170" cy="190" r="42" fill="url(#glow)" class="node-center"/>
              <text x="170" y="184" fill="white" font-size="9" font-weight="700" text-anchor="middle">PFAS</text>
              <text x="170" y="198" fill="white" font-size="8" font-weight="600" text-anchor="middle">at home</text>
            </svg>
          </div>
        </div>`;
    }

    // Concept 7: Vertical expandable tree
    function concept7() {
      const branches = DATA.rooms.map(r => `
        <div class="tree-branch">
          <div class="tree-room"><span>${r.emoji}</span> ${r.label}</div>
          ${r.items.map(i => `<div class="tree-leaf"><span>·</span> ${i}</div>`).join('')}
        </div>`).join('');
      return `
        <div class="screen-inner">
          <h2>PFAS hotspot tree</h2>
          <p class="hint">Scroll — full hierarchy visible</p>
          <div class="tree-scroll">
            <div class="tree-root">${DATA.center}</div>
            ${branches}
          </div>
        </div>`;
    }

    // Concept 8: CSS positioned web with SVG lines
    function concept8() {
      return `
        <div class="screen-inner">
          <h2>Connected hotspot web</h2>
          <p class="hint">Nodes linked center → room → item</p>
          <div class="web-graph">
            <svg class="wg-lines" viewBox="0 0 300 400" preserveAspectRatio="none">
              <line x1="150" y1="200" x2="150" y2="55" stroke="#b8dfc9" stroke-width="1.5"/>
              <line x1="150" y1="200" x2="255" y2="130" stroke="#b8dfc9" stroke-width="1.5"/>
              <line x1="150" y1="200" x2="45" y2="130" stroke="#b8dfc9" stroke-width="1.5"/>
              <line x1="150" y1="200" x2="150" y2="345" stroke="#b8dfc9" stroke-width="1.5"/>
              <line x1="150" y1="55" x2="100" y2="25" stroke="#dce8e2" stroke-width="1"/>
              <line x1="150" y1="55" x2="200" y2="25" stroke="#dce8e2" stroke-width="1"/>
              <line x1="255" y1="130" x2="285" y2="90" stroke="#dce8e2" stroke-width="1"/>
              <line x1="255" y1="130" x2="285" y2="160" stroke="#dce8e2" stroke-width="1"/>
              <line x1="45" y1="130" x2="15" y2="90" stroke="#dce8e2" stroke-width="1"/>
              <line x1="150" y1="345" x2="100" y2="375" stroke="#dce8e2" stroke-width="1"/>
              <line x1="150" y1="345" x2="200" y2="375" stroke="#dce8e2" stroke-width="1"/>
            </svg>
            <div class="wg-center">PFAS<br>at home</div>
            <div class="wg-room" style="top:4%; left:50%; transform:translateX(-50%)"><div class="bubble">🛏️</div>Bedroom</div>
            <div class="wg-room" style="top:22%; right:8%"><div class="bubble">🧴</div>Bath</div>
            <div class="wg-room" style="top:22%; left:8%"><div class="bubble">👕</div>Wardrobe</div>
            <div class="wg-room" style="bottom:8%; left:50%; transform:translateX(-50%)"><div class="bubble">🍳</div>Kitchen</div>
            <div class="wg-leaf" style="top:1%; left:22%">sheets</div>
            <div class="wg-leaf" style="top:1%; right:22%">air</div>
            <div class="wg-leaf" style="top:18%; right:0">skincare</div>
            <div class="wg-leaf" style="top:28%; right:0">cleaners</div>
            <div class="wg-leaf" style="top:18%; left:0">underwear</div>
            <div class="wg-leaf" style="bottom:1%; left:22%">tap water</div>
            <div class="wg-leaf" style="bottom:1%; right:22%">non-stick</div>
          </div>
        </div>`;
    }

    // Concept 9: Organic mind map SVG with curves
    function concept9() {
      return `
        <div class="screen-inner">
          <h2>Mind map</h2>
          <p class="hint">Organic branches from center</p>
          <div class="diag-box" style="background:white;border:1px solid #dce8e2;padding:0.25rem">
            <svg viewBox="0 0 340 360">
              <path d="M170,180 C120,180 90,120 70,90" fill="none" stroke="#2d8a5e" stroke-width="2.5" opacity="0.5"/>
              <path d="M170,180 C220,180 250,120 270,90" fill="none" stroke="#2d8a5e" stroke-width="2.5" opacity="0.5"/>
              <path d="M170,180 C120,200 70,250 50,300" fill="none" stroke="#2d8a5e" stroke-width="2.5" opacity="0.5"/>
              <path d="M170,180 C220,200 270,250 290,300" fill="none" stroke="#2d8a5e" stroke-width="2.5" opacity="0.5"/>
              <path d="M70,90 C55,75 35,55 25,45" fill="none" stroke="#b8dfc9" stroke-width="1.5"/>
              <path d="M70,90 C85,60 95,40 105,30" fill="none" stroke="#b8dfc9" stroke-width="1.5"/>
              <path d="M270,90 C255,55 245,35 235,25" fill="none" stroke="#b8dfc9" stroke-width="1.5"/>
              <path d="M270,90 C285,60 295,40 305,30" fill="none" stroke="#b8dfc9" stroke-width="1.5"/>
              <rect x="10" y="38" width="52" height="22" rx="11" fill="#e8f6ee" stroke="#2d8a5e"/>
              <text x="36" y="52" font-size="7" font-weight="600" text-anchor="middle">sheets</text>
              <rect x="88" y="18" width="40" height="22" rx="11" fill="#e8f6ee" stroke="#2d8a5e"/>
              <text x="108" y="32" font-size="7" font-weight="600" text-anchor="middle">air</text>
              <rect x="218" y="18" width="48" height="22" rx="11" fill="#e8f6ee" stroke="#2d8a5e"/>
              <text x="242" y="32" font-size="6" font-weight="600" text-anchor="middle">skincare</text>
              <rect x="288" y="22" width="44" height="22" rx="11" fill="#e8f6ee" stroke="#2d8a5e"/>
              <text x="310" y="36" font-size="6" font-weight="600" text-anchor="middle">cleaners</text>
              <rect x="8" y="288" width="48" height="22" rx="11" fill="#e8f6ee" stroke="#2d8a5e"/>
              <text x="32" y="302" font-size="6" font-weight="600" text-anchor="middle">underwear</text>
              <rect x="268" y="288" width="52" height="22" rx="11" fill="#e8f6ee" stroke="#2d8a5e"/>
              <text x="294" y="302" font-size="6" font-weight="600" text-anchor="middle">tap water</text>
              <circle cx="70" cy="90" r="28" fill="#d8f0e4" stroke="#2d8a5e" stroke-width="2"/>
              <text x="70" y="86" font-size="13" text-anchor="middle">🛏️</text>
              <text x="70" y="102" font-size="7" font-weight="700" text-anchor="middle">Bedroom</text>
              <circle cx="270" cy="90" r="28" fill="#d8f0e4" stroke="#2d8a5e" stroke-width="2"/>
              <text x="270" y="86" font-size="13" text-anchor="middle">🧴</text>
              <text x="270" y="102" font-size="7" font-weight="700" text-anchor="middle">Bathroom</text>
              <circle cx="50" cy="300" r="28" fill="#d8f0e4" stroke="#2d8a5e" stroke-width="2"/>
              <text x="50" y="296" font-size="13" text-anchor="middle">👕</text>
              <text x="50" y="312" font-size="7" font-weight="700" text-anchor="middle">Wardrobe</text>
              <circle cx="290" cy="300" r="28" fill="#d8f0e4" stroke="#2d8a5e" stroke-width="2"/>
              <text x="290" y="296" font-size="13" text-anchor="middle">🍳</text>
              <text x="290" y="312" font-size="7" font-weight="700" text-anchor="middle">Kitchen</text>
              <circle cx="170" cy="180" r="38" fill="#2d8a5e"/>
              <text x="170" y="174" fill="white" font-size="8" font-weight="700" text-anchor="middle">PFAS</text>
              <text x="170" y="188" fill="white" font-size="7" font-weight="600" text-anchor="middle">at home</text>
            </svg>
          </div>
        </div>`;
    }

    // Concept 10: Sunburst radial
    function concept10() {
      return `
        <div class="screen-inner">
          <h2>Sunburst map</h2>
          <p class="hint">Rings: center → room → items</p>
          <div class="diag-box" style="background:#f0f7f4;border:1px solid #dce8e2;padding:0.35rem">
            <svg viewBox="0 0 320 320">
              <!-- outer item ring segments (simplified as dots on ring) -->
              <circle cx="160" cy="160" r="130" fill="none" stroke="#c5ddd0" stroke-width="1" stroke-dasharray="4 4"/>
              <circle cx="160" cy="160" r="95" fill="none" stroke="#b8dfc9" stroke-width="8" opacity="0.35"/>
              <circle cx="160" cy="160" r="55" fill="none" stroke="#2d8a5e" stroke-width="12" opacity="0.25"/>
              <!-- room labels on middle ring -->
              <text x="160" y="58" font-size="8" font-weight="700" text-anchor="middle">🛏️ Bedroom</text>
              <text x="258" y="168" font-size="8" font-weight="700" text-anchor="middle">🧴 Bath</text>
              <text x="160" y="278" font-size="8" font-weight="700" text-anchor="middle">🍳 Kitchen</text>
              <text x="42" y="168" font-size="8" font-weight="700" text-anchor="middle">👕 Closet</text>
              <!-- outer item labels -->
              <text x="160" y="22" font-size="6" fill="#5c7268" text-anchor="middle">sheets · air</text>
              <text x="295" y="100" font-size="6" fill="#5c7268" text-anchor="middle">skincare</text>
              <text x="295" y="200" font-size="6" fill="#5c7268" text-anchor="middle">cleaners</text>
              <text x="160" y="305" font-size="6" fill="#5c7268" text-anchor="middle">water · pans · cans</text>
              <text x="25" y="200" font-size="6" fill="#5c7268" text-anchor="middle">underwear</text>
              <text x="25" y="100" font-size="6" fill="#5c7268" text-anchor="middle">athletic</text>
              <!-- center -->
              <circle cx="160" cy="160" r="48" fill="#2d8a5e"/>
              <text x="160" y="154" fill="white" font-size="9" font-weight="700" text-anchor="middle">PFAS</text>
              <text x="160" y="168" fill="white" font-size="7" text-anchor="middle">at home</text>
              <!-- decorative spokes -->
              <line x1="160" y1="112" x2="160" y2="30" stroke="#b8dfc9" stroke-width="1"/>
              <line x1="208" y1="160" x2="290" y2="160" stroke="#b8dfc9" stroke-width="1"/>
              <line x1="160" y1="208" x2="160" y2="290" stroke="#b8dfc9" stroke-width="1"/>
              <line x1="112" y1="160" x2="30" y2="160" stroke="#b8dfc9" stroke-width="1"/>
            </svg>
          </div>
        </div>`;
    }

    const concepts = {
      6: concept6(),
      7: concept7(),
      8: concept8(),
      9: concept9(),
      10: concept10(),
    };

    function show(n) {
      document.getElementById('screen').innerHTML = concepts[n];
      document.getElementById('single-label').innerHTML = labels[n];
      document.querySelectorAll('.tabs button').forEach(b =>
        b.classList.toggle('active', b.dataset.c === n));
    }

    document.getElementById('tabs').addEventListener('click', e => {
      if (e.target.dataset.c) show(e.target.dataset.c);
    });

    if (window.innerWidth >= 960) {
      const grid = document.getElementById('grid');
      Object.keys(concepts).forEach(n => {
        grid.innerHTML += `
          <div>
            <p class="out-label">${labels[n]}</p>
            <div class="phone-wrap"><div class="phone"><div class="screen">${concepts[n]}</div></div></div>
          </div>`;
      });
    } else {
      show('6');
    }
  </script>
</body>
</html>
