<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10 Design Styles — PFAS Cutoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@500;600&family=Courier+Prime:wght@400;700&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Source+Sans+3:wght@400;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #d8d4cc;
      color: #1a1a1a;
      padding: 1rem;
    }
    header { text-align: center; max-width: 720px; margin: 0 auto 1rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; }
    header p { font-size: 0.85rem; color: #555; margin-top: 0.4rem; line-height: 1.45; }
    .banner { text-align: center; font-size: 0.72rem; font-weight: 600; color: #2d6a4f; margin-bottom: 0.75rem; }
    .tabs {
      display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: center;
      margin-bottom: 1rem; max-width: 900px; margin-left: auto; margin-right: auto;
    }
    .tabs button {
      font: 600 0.68rem 'DM Sans', sans-serif;
      padding: 0.4rem 0.65rem;
      border-radius: 6px;
      border: 2px solid #bbb;
      background: #f5f3ef;
      cursor: pointer;
      color: #333;
    }
    .tabs button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .stage { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
    .phone {
      width: 100%; max-width: 360px;
      background: #111;
      border-radius: 32px;
      padding: 10px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    .screen {
      border-radius: 24px;
      overflow: hidden;
      min-height: 620px;
      max-height: 680px;
      overflow-y: auto;
    }
    .style-panel { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
    .style-panel.active { display: flex; }
    .desc {
      max-width: 320px;
      font-size: 0.78rem;
      line-height: 1.45;
      color: #444;
      padding: 0.5rem 0;
    }
    .desc strong { color: #1a1a1a; }

    /* Shared mock structure */
    .mock { padding: 1rem 0.9rem 1.25rem; min-height: 600px; }
    .mock-brand { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 0.75rem; }
    .mock-stat { margin-bottom: 1rem; }
    .mock-stat-val { font-size: 2rem; line-height: 1; font-weight: 700; }
    .mock-stat-label { font-size: 0.78rem; line-height: 1.35; margin-top: 0.25rem; }
    .mock-stat-src { font-size: 0.65rem; margin-top: 0.35rem; opacity: 0.7; }
    .mock-h2 { font-size: 1rem; margin-bottom: 0.2rem; }
    .mock-hint { font-size: 0.68rem; margin-bottom: 0.6rem; opacity: 0.75; }
    .mock-list { border-radius: 4px; overflow: hidden; }
    .mock-room-head {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 0.5rem; font-size: 0.82rem; font-weight: 600;
    }
    .mock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mock-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.55rem; font-size: 0.75rem; margin-bottom: 0.35rem;
    }
    .mock-item:last-child { margin-bottom: 0; }
    .mock-tabs {
      display: flex; border-top: 1px solid;
      margin-top: 1rem; padding-top: 0.5rem;
      font-size: 0.65rem; font-weight: 600;
      justify-content: space-around; opacity: 0.85;
    }

    /* 1 Editorial Noir */
    .s1 { background: #fafafa; color: #111; font-family: 'Source Sans 3', sans-serif; }
    .s1 .mock-brand { font-family: 'Playfair Display', serif; font-weight: 700; letter-spacing: 0.2em; font-size: 0.65rem; }
    .s1 .mock-stat { border-top: 3px solid #111; border-bottom: 1px solid #111; padding: 0.75rem 0; }
    .s1 .mock-stat-val { font-family: 'Playfair Display', serif; font-style: italic; }
    .s1 .mock-h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; }
    .s1 .mock-list { border: 1px solid #111; }
    .s1 .mock-room-head { border-bottom: 1px solid #ddd; }
    .s1 .mock-item { background: #fff; border: 1px solid #ccc; }
    .s1 .mock-dot { background: #c41e3a; }

    /* 2 Wabi Paper */
    .s2 { background: #f7f4ee; color: #3d3a35; font-family: 'Noto Serif JP', serif; }
    .s2 .mock-brand { font-weight: 400; letter-spacing: 0.35em; color: #8a8278; }
    .s2 .mock-stat { padding: 1rem 0; text-align: center; }
    .s2 .mock-stat-val { font-size: 1.5rem; font-weight: 400; }
    .s2 .mock-stat-label { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; }
    .s2 .mock-list { border: none; }
    .s2 .mock-room-head { border-bottom: 1px solid #e0d8cc; font-family: 'DM Sans', sans-serif; }
    .s2 .mock-item { background: transparent; border: 1px solid #e0d8cc; border-radius: 2px; font-family: 'DM Sans', sans-serif; }
    .s2 .mock-dot { background: #a8a090; border-radius: 0; width: 6px; height: 6px; }

    /* 3 Clinic Pamphlet */
    .s3 { background: #fff; color: #1a3050; font-family: 'Source Sans 3', sans-serif; }
    .s3 .mock-brand { background: #1a4d8c; color: #fff; padding: 0.5rem 0.65rem; margin: -1rem -0.9rem 0.75rem; letter-spacing: 0.05em; }
    .s3 .mock-stat { background: #e8f0fa; padding: 0.65rem; border-left: 4px solid #1a4d8c; }
    .s3 .mock-stat-val { color: #1a4d8c; font-weight: 700; }
    .s3 .mock-h2 { font-size: 0.95rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .s3 .mock-list { border: 2px solid #1a4d8c; }
    .s3 .mock-room-head { background: #e8f0fa; }
    .s3 .mock-item { background: #fff; border: 1px solid #c5d5ea; }
    .s3 .mock-dot { background: #1a4d8c; }

    /* 4 Swiss Poster */
    .s4 { background: #f0f0f0; color: #111; font-family: 'Space Grotesk', sans-serif; }
    .s4 .mock-brand { background: #e63946; color: #fff; display: inline-block; padding: 0.25rem 0.5rem; letter-spacing: 0; }
    .s4 .mock-stat { background: #111; color: #fff; padding: 0.75rem; margin-bottom: 0.75rem; }
    .s4 .mock-stat-val { font-family: 'Archivo Black', sans-serif; font-size: 2.5rem; }
    .s4 .mock-h2 { font-family: 'Archivo Black', sans-serif; font-size: 1.1rem; }
    .s4 .mock-list { border: 3px solid #111; }
    .s4 .mock-room-head { background: #ffd60a; }
    .s4 .mock-item { background: #fff; border: 2px solid #111; border-radius: 0; }
    .s4 .mock-dot { background: #e63946; border-radius: 0; }

    /* 5 Field Guide */
    .s5 { background: #e8dcc8; color: #2c2418; font-family: 'Libre Baskerville', serif; }
    .s5 .mock-brand { font-family: 'Courier Prime', monospace; font-size: 0.65rem; letter-spacing: 0.15em; }
    .s5 .mock-stat {
      border: 2px dashed #6b5a42; padding: 0.65rem;
      background: #f5edd8; position: relative;
    }
    .s5 .mock-stat::before {
      content: 'SPECIMEN'; position: absolute; top: 4px; right: 6px;
      font-family: 'Courier Prime', monospace; font-size: 0.5rem; letter-spacing: 0.1em;
      color: #8a7355;
    }
    .s5 .mock-stat-val { font-size: 1.75rem; }
    .s5 .mock-h2 { font-size: 1rem; }
    .s5 .mock-list { border: 1px solid #6b5a42; background: #f5edd8; }
    .s5 .mock-room-head { border-bottom: 1px solid #c4b498; }
    .s5 .mock-item { border: 1px solid #c4b498; background: #faf6ec; font-family: 'Source Sans 3', sans-serif; font-size: 0.72rem; }
    .s5 .mock-dot { background: #5c7a52; }

    /* 6 Brutalist */
    .s6 { background: #fff; color: #000; font-family: 'IBM Plex Mono', monospace; }
    .s6 .mock-brand { font-weight: 600; letter-spacing: 0; text-transform: uppercase; }
    .s6 .mock-stat { border: 3px solid #000; padding: 0.65rem; }
    .s6 .mock-stat-val { font-size: 2.2rem; font-weight: 600; }
    .s6 .mock-stat-label { font-family: 'DM Sans', sans-serif; }
    .s6 .mock-h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; }
    .s6 .mock-list { border: 3px solid #000; }
    .s6 .mock-room-head { border-bottom: 3px solid #000; }
    .s6 .mock-item { border: 2px solid #000; border-radius: 0; font-family: 'DM Sans', sans-serif; }
    .s6 .mock-dot { background: #000; border-radius: 0; width: 10px; height: 10px; }

    /* 7 Terracotta */
    .s7 { background: #faf3eb; color: #4a3228; font-family: 'DM Sans', sans-serif; }
    .s7 .mock-brand { color: #c45c3a; letter-spacing: 0.15em; }
    .s7 .mock-stat {
      background: linear-gradient(135deg, #e8c4a8 0%, #d4a574 100%);
      color: #3d2818; padding: 0.85rem; border-radius: 20px;
    }
    .s7 .mock-stat-val { font-family: 'Playfair Display', serif; }
    .s7 .mock-h2 { font-family: 'Playfair Display', serif; color: #5c3d2e; }
    .s7 .mock-list { background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(92, 48, 28, 0.08); }
    .s7 .mock-room-head { border-radius: 16px 16px 0 0; }
    .s7 .mock-item { background: #fdf8f3; border: 1px solid #e8d4c0; border-radius: 12px; }
    .s7 .mock-dot { background: #c45c3a; }

    /* 8 Apothecary */
    .s8 { background: #1a2e24; color: #e8e4d4; font-family: 'Libre Baskerville', serif; }
    .s8 .mock-brand {
      color: #c8d4b8; font-size: 0.7rem; letter-spacing: 0.25em;
      border-bottom: 1px solid #3d5248; padding-bottom: 0.5rem;
    }
    .s8 .mock-stat {
      border: 1px solid #4a6358; padding: 0.75rem;
      background: #243830; border-radius: 4px 4px 4px 12px;
    }
    .s8 .mock-stat-val { color: #d4e8c8; font-size: 1.85rem; }
    .s8 .mock-stat-label { font-family: 'Source Sans 3', sans-serif; font-size: 0.72rem; }
    .s8 .mock-h2 { color: #d4e8c8; font-size: 1rem; }
    .s8 .mock-hint { color: #8aa898; }
    .s8 .mock-list { border: 1px solid #4a6358; background: #1f3228; }
    .s8 .mock-room-head { border-bottom: 1px solid #3d5248; font-family: 'Source Sans 3', sans-serif; }
    .s8 .mock-item { border: 1px solid #3d5248; background: #243830; font-family: 'Source Sans 3', sans-serif; font-size: 0.72rem; }
    .s8 .mock-dot { background: #7ab88a; }
    .s8 .mock-tabs { border-color: #3d5248; color: #8aa898; }

    /* 9 Newsprint */
    .s9 { background: #f2f0ea; color: #222; font-family: 'Libre Baskerville', serif; }
    .s9 .mock-brand {
      font-family: 'Courier Prime', monospace; font-size: 0.6rem;
      text-align: center; border-bottom: 1px solid #222; padding-bottom: 0.35rem;
    }
    .s9 .mock-stat { text-align: center; padding: 0.5rem 0; border-bottom: 1px solid #aaa; }
    .s9 .mock-stat-val { font-size: 1.6rem; }
    .s9 .mock-stat-label { font-family: 'Source Sans 3', sans-serif; font-size: 0.7rem; columns: 1; }
    .s9 .mock-h2 {
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em;
      border-top: 2px solid #222; padding-top: 0.5rem;
    }
    .s9 .mock-list { border-top: 1px solid #aaa; border-bottom: 1px solid #aaa; }
    .s9 .mock-room-head { font-family: 'Source Sans 3', sans-serif; font-size: 0.75rem; font-weight: 700; }
    .s9 .mock-item { font-family: 'Source Sans 3', sans-serif; font-size: 0.7rem; border-bottom: 1px solid #ccc; margin: 0; border-radius: 0; background: transparent; }
    .s9 .mock-dot { background: #222; width: 4px; height: 4px; }

    /* 10 Ink Sketch */
    .s10 { background: #fffef9; color: #2a2a2a; font-family: 'DM Sans', sans-serif; }
    .s10 .mock-brand { font-family: 'Caveat', cursive; font-size: 1.1rem; letter-spacing: 0; color: #555; }
    .s10 .mock-stat {
      border: 2px solid #2a2a2a; border-radius: 3px 8px 4px 7px;
      padding: 0.65rem; transform: rotate(-0.5deg);
      box-shadow: 3px 3px 0 #e0e0e0;
    }
    .s10 .mock-stat-val { font-family: 'Caveat', cursive; font-size: 2.2rem; }
    .s10 .mock-h2 { font-family: 'Caveat', cursive; font-size: 1.25rem; }
    .s10 .mock-list { border: 2px solid #2a2a2a; border-radius: 5px 9px 6px 8px; transform: rotate(0.3deg); }
    .s10 .mock-room-head { border-bottom: 2px solid #2a2a2a; }
    .s10 .mock-item {
      border: 1.5px solid #2a2a2a; border-radius: 4px 7px 5px 6px;
      background: #fff; transform: rotate(-0.2deg);
    }
    .s10 .mock-dot { background: #2a2a2a; border-radius: 50%; }
  </style>
</head>
<body>
  <header>
    <h1>10 design directions</h1>
    <p>Each mock shows the same home screen — stats, hotspot list, tab bar — in a different visual language. Pick a number and we’ll apply it to the real app.</p>
  </header>
  <p class="banner">Scroll inside the phone · switch tabs above to compare</p>

  <div class="tabs" id="tabs"></div>

  <div class="stage" id="stage"></div>

  <script>
    const MOCK = `
      <div class="mock-brand">PFAS CUTOFF</div>
      <div class="mock-stat">
        <div class="mock-stat-val">97%</div>
        <div class="mock-stat-label">of Americans have PFAS in their blood</div>
        <div class="mock-stat-src">CDC ATSDR ↗</div>
      </div>
      <div class="mock-h2">Where PFAS hide at home</div>
      <div class="mock-hint">Open a room · tap an item for swaps</div>
      <div class="mock-list">
        <div class="mock-room-head"><span class="mock-dot"></span> Kitchen <span style="margin-left:auto">▾</span></div>
        <div style="padding:0.35rem 0.5rem 0.5rem">
          <div class="mock-item"><span>Tap water</span><span>→</span></div>
          <div class="mock-item"><span>Non-stick pans</span><span>→</span></div>
        </div>
        <div class="mock-room-head"><span class="mock-dot" style="background:#c4a88c"></span> Bathroom <span style="margin-left:auto">▸</span></div>
      </div>
      <div class="mock-tabs"><span>◯ Home</span><span>↑ Swaps</span><span>⌂ Shop</span></div>
    `;

    const STYLES = [
      { id: 1, tab: '1 · Editorial', name: 'Editorial Noir', vibe: 'Magazine cover energy — black rules, serif headlines, one sharp accent. Feels authored, not templated.', class: 's1' },
      { id: 2, tab: '2 · Wabi', name: 'Wabi Paper', vibe: 'Quiet Japanese minimalism — lots of air, hairline borders, muted stone tones. Calm and intentional.', class: 's2' },
      { id: 3, tab: '3 · Clinic', name: 'Health Clinic Pamphlet', vibe: 'Trustworthy institutional — blue header band, clear hierarchy. Like a good hospital handout, not a startup landing page.', class: 's3' },
      { id: 4, tab: '4 · Swiss', name: 'Swiss Poster', vibe: 'Bold grid, primary color blocks, heavy type. Graphic and confident — stands out in a feed.', class: 's4' },
      { id: 5, tab: '5 · Field', name: 'Field Guide', vibe: 'Naturalist notebook — kraft tones, dashed borders, specimen labels. Earthy and curious.', class: 's5' },
      { id: 6, tab: '6 · Brutalist', name: 'Brutalist Raw', vibe: 'Thick black borders, monospace accents, zero fluff. Honest and direct — anti-gradient.', class: 's6' },
      { id: 7, tab: '7 · Clay', name: 'Terracotta Studio', vibe: 'Warm clay and cream, soft rounded cards. Human and tactile — spa-adjacent without being generic wellness.', class: 's7' },
      { id: 8, tab: '8 · Apothecary', name: 'Vintage Apothecary', vibe: 'Dark green glass, cream type, label frames. Old-world pharmacy — distinctive dark mode alternative.', class: 's8' },
      { id: 9, tab: '9 · News', name: 'Newsprint', vibe: 'Newspaper column rules, small caps, gray body text. Information-first, serious journalism feel.', class: 's9' },
      { id: 10, tab: '10 · Sketch', name: 'Ink Sketch', vibe: 'Hand-drawn borders, slightly imperfect angles, script accents. Friendly and human-made.', class: 's10' },
    ];

    const tabsEl = document.getElementById('tabs');
    const stageEl = document.getElementById('stage');

    STYLES.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.textContent = s.tab;
      btn.type = 'button';
      if (i === 0) btn.classList.add('active');
      btn.onclick = () => show(i);
      tabsEl.appendChild(btn);

      const wrap = document.createElement('div');
      wrap.className = 'style-panel' + (i === 0 ? ' active' : '');
      wrap.id = 'panel-' + i;
      wrap.innerHTML = `
        <div class="phone">
          <div class="screen ${s.class}">${MOCK}</div>
        </div>
        <div class="desc">
          <strong>${s.name}</strong><br>${s.vibe}
        </div>`;
      stageEl.appendChild(wrap);
    });

    function show(i) {
      tabsEl.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
      stageEl.querySelectorAll('.style-panel').forEach((p, j) => p.classList.toggle('active', j === i));
    }
  </script>
</body>
</html>
