<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PFAS Cutoff — 5 Home Page Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #e8ece9;
      color: #1a2e28;
      min-height: 100vh;
    }

    .showcase-header {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .showcase-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      margin-bottom: 0.35rem;
    }
    .showcase-header p {
      font-size: 0.88rem;
      color: #5c7268;
      margin-bottom: 1rem;
    }

    .concept-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      padding: 0 1rem 1.25rem;
    }
    .concept-tabs button {
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      border: 2px solid #dce8e2;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .concept-tabs button.active {
      background: #2d8a5e;
      border-color: #2d8a5e;
      color: white;
    }

    .phone-stage {
      display: flex;
      justify-content: center;
      padding: 0 1rem 2rem;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      height: 780px;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18), inset 0 0 0 10px #1a1a1a;
      background: #1a1a1a;
      position: relative;
    }
    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #1a1a1a;
      border-radius: 0 0 16px 16px;
      z-index: 20;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      border-radius: 28px;
      -webkit-overflow-scrolling: touch;
    }

    .concept { display: none; min-height: 100%; }
    .concept.active { display: block; }

    /* Shared mobile UI bits */
    .m-btn {
      display: block;
      width: 100%;
      padding: 0.95rem 1.25rem;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .m-btn-ghost {
      background: transparent;
      color: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      margin-top: 0.65rem;
      border: none;
      cursor: pointer;
      width: 100%;
      padding: 0.5rem;
    }

    /* ─── CONCEPT 1: Story cards (TikTok-style awareness) ─── */
    .c1 {
      background: linear-gradient(180deg, #f0faf5 0%, #e8f4ec 100%);
      padding: 2.5rem 1.25rem 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .c1 .logo-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 700;
      font-size: 0.85rem;
      color: #2d8a5e;
      margin-bottom: 1.5rem;
    }
    .c1 .story-card {
      background: white;
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 32px rgba(45,138,94,0.1);
      border: 1px solid rgba(45,138,94,0.12);
    }
    .c1 .story-num {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #2d8a5e;
      margin-bottom: 0.75rem;
    }
    .c1 .story-visual {
      height: 140px;
      border-radius: 16px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      background: linear-gradient(135deg, #d8f0e4, #b8e6cc);
    }
    .c1 h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.35rem;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .c1 p {
      font-size: 0.88rem;
      color: #5c7268;
      line-height: 1.45;
    }
    .c1 .m-btn { background: #2d8a5e; color: white; margin-top: 0.5rem; }

    /* ─── CONCEPT 2: Single bold hero + exposure map ─── */
    .c2 {
      background: #fafcfb;
      padding: 2.5rem 0 1.5rem;
      min-height: 100%;
    }
    .c2 .hero-img {
      height: 220px;
      background: url('https://images.unsplash.com/photo-1610836933304-5cb9787c6e67?auto=format&fit=crop&w=800&h=600&q=80') center/cover;
      position: relative;
    }
    .c2 .hero-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #fafcfb 0%, transparent 60%);
    }
    .c2 .hero-content {
      padding: 0 1.25rem;
      margin-top: -2rem;
      position: relative;
    }
    .c2 h1 {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .c2 .sub { font-size: 0.9rem; color: #5c7268; margin-bottom: 1.25rem; }
    .c2 .bubble-map {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .c2 .bubble {
      background: white;
      border: 1px solid #dce8e2;
      border-radius: 16px;
      padding: 0.85rem;
      text-align: center;
    }
    .c2 .bubble.big { grid-column: span 2; background: #fdeeed; border-color: #f0c4c0; }
    .c2 .bubble span { font-size: 1.5rem; display: block; margin-bottom: 0.25rem; }
    .c2 .bubble strong { font-size: 0.78rem; display: block; }
    .c2 .bubble small { font-size: 0.68rem; color: #5c7268; }
    .c2 .m-btn { background: #1a2e28; color: white; margin: 0 1.25rem; width: calc(100% - 2.5rem); }

    /* ─── CONCEPT 3: Split swap (before → after) ─── */
    .c3 {
      background: white;
      padding: 2.5rem 1.25rem 1.5rem;
    }
    .c3 h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.75rem;
      text-align: center;
      margin-bottom: 0.35rem;
    }
    .c3 .tagline {
      text-align: center;
      font-size: 0.85rem;
      color: #5c7268;
      margin-bottom: 1.25rem;
    }
    .c3 .swap-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.65rem;
      background: #f8faf9;
      border-radius: 16px;
      padding: 0.75rem;
      border: 1px solid #e8ece9;
    }
    .c3 .swap-bad, .c3 .swap-good {
      flex: 1;
      text-align: center;
      padding: 0.65rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .c3 .swap-bad {
      background: #fdeeed;
      color: #c4453c;
    }
    .c3 .swap-good {
      background: #e8f6ee;
      color: #2d8a5e;
    }
    .c3 .swap-bad span, .c3 .swap-good span {
      display: block;
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
    }
    .c3 .arrow {
      font-size: 1.25rem;
      color: #9ab0a6;
      flex-shrink: 0;
    }
    .c3 .m-btn { background: #2d8a5e; color: white; margin-top: 1rem; }

    /* ─── CONCEPT 4: Quiz-first (one tap to start) ─── */
    .c4 {
      background: linear-gradient(165deg, #2d8a5e 0%, #1f6b47 55%, #164d35 100%);
      color: white;
      padding: 2.5rem 1.25rem 1.5rem;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    .c4 .pill {
      align-self: flex-start;
      background: rgba(255,255,255,0.2);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }
    .c4 h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.1rem;
      line-height: 1.15;
      margin-bottom: 2rem;
    }
    .c4 .question-card {
      background: white;
      color: #1a2e28;
      border-radius: 24px;
      padding: 1.25rem;
      flex: 1;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    }
    .c4 .q-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #2d8a5e;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .c4 .q-img {
      height: 120px;
      border-radius: 14px;
      background: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=600&h=400&q=80') center/cover;
      margin-bottom: 1rem;
    }
    .c4 .question-card h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    .c4 .opt {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
      border: 2px solid #e8ece9;
      border-radius: 12px;
      background: #f8faf9;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
    }
    .c4 .opt:hover { border-color: #2d8a5e; background: #e8f6ee; }

    /* ─── CONCEPT 5: Editorial stat punch ─── */
    .c5 {
      background: #fffef9;
      padding: 2.5rem 1.25rem 1.5rem;
      min-height: 100%;
    }
    .c5 .stat-hero {
      text-align: center;
      padding: 1.5rem 0 1.25rem;
    }
    .c5 .stat-num {
      font-family: 'Fraunces', serif;
      font-size: 4.5rem;
      font-weight: 700;
      color: #2d8a5e;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .c5 .stat-label {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 0.25rem;
      line-height: 1.3;
    }
    .c5 .stat-source {
      font-size: 0.72rem;
      color: #9ab0a6;
      margin-top: 0.5rem;
    }
    .c5 .divider {
      height: 1px;
      background: #e8ece9;
      margin: 1rem 0;
    }
    .c5 h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .c5 .path-steps {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .c5 .path-step {
      flex: 1;
      background: white;
      border: 1px solid #e8ece9;
      border-radius: 14px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }
    .c5 .path-step .icon { font-size: 1.5rem; display: block; margin-bottom: 0.35rem; }
    .c5 .path-step strong { font-size: 0.72rem; display: block; line-height: 1.2; }
    .c5 .product-preview {
      display: flex;
      gap: 0.65rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      -webkit-overflow-scrolling: touch;
    }
    .c5 .product-preview::-webkit-scrollbar { display: none; }
    .c5 .prod-chip {
      flex: 0 0 100px;
      background: white;
      border: 1px solid #e8ece9;
      border-radius: 14px;
      padding: 0.65rem;
      text-align: center;
    }
    .c5 .prod-chip .img {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      background: #e8f6ee;
      margin: 0 auto 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }
    .c5 .prod-chip span { font-size: 0.65rem; font-weight: 600; line-height: 1.2; }
    .c5 .m-btn { background: #2d8a5e; color: white; }

    .concept-label {
      text-align: center;
      font-size: 0.8rem;
      color: #5c7268;
      padding: 0 1rem 0.5rem;
      max-width: 390px;
      margin: 0 auto;
    }
    .concept-label strong { color: #1a2e28; }

    @media (min-width: 860px) {
      .all-concepts {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
        padding: 1rem 2rem 3rem;
        max-width: 900px;
        margin: 0 auto;
      }
      .phone-stage { padding: 0; }
      .concept-tabs { display: none; }
      .concept { display: block !important; }
      .phone { height: 700px; max-width: 340px; }
      .showcase-header p::after {
        content: ' Scroll or view all five phones below.';
      }
    }
  </style>
</head>
<body>
  <header class="showcase-header">
    <h1>5 mobile home page concepts</h1>
    <p>Simplified path: <strong>awareness → your hotspots → product swaps</strong></p>
  </header>

  <nav class="concept-tabs" id="tabs">
    <button class="active" data-c="1">1 · Story cards</button>
    <button data-c="2">2 · Exposure map</button>
    <button data-c="3">3 · Before → after</button>
    <button data-c="4">4 · Quiz-first</button>
    <button data-c="5">5 · Stat punch</button>
  </nav>

  <div id="single-view">
    <p class="concept-label" id="concept-label"><strong>Concept 1:</strong> Swipeable awareness cards, then one CTA</p>
    <div class="phone-stage">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="phone-screen" id="phone-screen"></div>
      </div>
    </div>
  </div>

  <div class="all-concepts" id="grid-view" style="display:none"></div>

  <script>
    const concepts = {
      1: {
        label: '<strong>Concept 1:</strong> Story cards — 3 quick slides, one CTA',
        html: `
          <div class="concept c1 active">
            <div class="logo-row">◯ PFAS Cutoff</div>
            <div class="story-card">
              <div class="story-num">01 · AWARENESS</div>
              <div class="story-visual">🧪</div>
              <h2>Forever chemicals are in everyday stuff</h2>
              <p>Cans, bottle seals, non-stick pans. They build up in your body over years.</p>
            </div>
            <div class="story-card">
              <div class="story-num">02 · YOUR BODY</div>
              <div class="story-visual">🧠</div>
              <h2>Found in blood & brain tissue</h2>
              <p>Studies link PFAS to hormones, immunity, and cognitive health.</p>
            </div>
            <div class="story-card">
              <div class="story-num">03 · YOUR PATH</div>
              <div class="story-visual">✨</div>
              <h2>Swap the worst offenders first</h2>
              <p>2-min quiz → your hotspots → vetted products. No overwhelm.</p>
            </div>
            <button class="m-btn">Find my swaps</button>
            <button class="m-btn-ghost">Browse products</button>
          </div>`
      },
      2: {
        label: '<strong>Concept 2:</strong> Hero image + visual exposure map',
        html: `
          <div class="concept c2 active">
            <div class="hero-img"></div>
            <div class="hero-content">
              <h1>Know where PFAS hide</h1>
              <p class="sub">Most people miss the biggest sources.</p>
              <div class="bubble-map">
                <div class="bubble big"><span>🥫</span><strong>Canned food liners</strong><small>Highest impact</small></div>
                <div class="bubble"><span>🫧</span><strong>Bottle seals</strong><small>Sparkling drinks</small></div>
                <div class="bubble"><span>🍳</span><strong>Non-stick pans</strong><small>Daily cooking</small></div>
                <div class="bubble"><span>💧</span><strong>Tap water</strong><small>Drink + cook</small></div>
                <div class="bubble"><span>👕</span><strong>Synthetics</strong><small>On your skin</small></div>
              </div>
            </div>
            <button class="m-btn">What applies to me? →</button>
          </div>`
      },
      3: {
        label: '<strong>Concept 3:</strong> Before → after swaps (visual, scannable)',
        html: `
          <div class="concept c3 active">
            <h1>Swap, don't stress</h1>
            <p class="tagline">High-PFAS → clean alternatives</p>
            <div class="swap-row">
              <div class="swap-bad"><span>🥫</span>Canned beans</div>
              <div class="arrow">→</div>
              <div class="swap-good"><span>🫙</span>Jarred / dried</div>
            </div>
            <div class="swap-row">
              <div class="swap-bad"><span>🫧</span>Bottled sparkling</div>
              <div class="arrow">→</div>
              <div class="swap-good"><span>🚰</span>Filtered tap</div>
            </div>
            <div class="swap-row">
              <div class="swap-bad"><span>🍳</span>Non-stick pan</div>
              <div class="arrow">→</div>
              <div class="swap-good"><span>🥘</span>Cast iron</div>
            </div>
            <div class="swap-row">
              <div class="swap-bad"><span>📦</span>Plastic heat</div>
              <div class="arrow">→</div>
              <div class="swap-good"><span>🫙</span>Glass storage</div>
            </div>
            <button class="m-btn">Get my personalized list</button>
            <button class="m-btn-ghost">Shop all swaps</button>
          </div>`
      },
      4: {
        label: '<strong>Concept 4:</strong> Quiz-first — home IS the first question',
        html: `
          <div class="concept c4 active">
            <div class="pill">2 MIN · NO SIGNUP</div>
            <h1>Let's find your PFAS hotspots</h1>
            <div class="question-card">
              <div class="q-label">Kitchen · Question 1</div>
              <div class="q-img"></div>
              <h2>How often do you cook with non-stick pans?</h2>
              <button class="opt">Never or rarely</button>
              <button class="opt">A few times a month</button>
              <button class="opt">Several times a week</button>
              <button class="opt">Almost every day</button>
            </div>
          </div>`
      },
      5: {
        label: '<strong>Concept 5:</strong> Stat punch + 3-step path + product preview',
        html: `
          <div class="concept c5 active">
            <div class="stat-hero">
              <div class="stat-num">97%</div>
              <div class="stat-label">of Americans have PFAS in their blood</div>
              <div class="stat-source">CDC National Health Study</div>
            </div>
            <div class="divider"></div>
            <h2>Your path</h2>
            <div class="path-steps">
              <div class="path-step"><span class="icon">📖</span><strong>Learn the risks</strong></div>
              <div class="path-step"><span class="icon">🎯</span><strong>Find your hotspots</strong></div>
              <div class="path-step"><span class="icon">🛒</span><strong>Swap products</strong></div>
            </div>
            <h2>Popular swaps</h2>
            <div class="product-preview">
              <div class="prod-chip"><div class="img">🫙</div><span>Glass storage</span></div>
              <div class="prod-chip"><div class="img">🥘</div><span>Cast iron</span></div>
              <div class="prod-chip"><div class="img">👕</div><span>Cotton underwear</span></div>
              <div class="prod-chip"><div class="img">💧</div><span>Water filter</span></div>
            </div>
            <button class="m-btn">Start with a 2-min quiz</button>
          </div>`
      }
    };

    function showConcept(n) {
      document.getElementById('concept-label').innerHTML = concepts[n].label;
      document.getElementById('phone-screen').innerHTML = concepts[n].html;
      document.querySelectorAll('.concept-tabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.c === String(n));
      });
    }

    document.getElementById('tabs').addEventListener('click', e => {
      if (e.target.dataset.c) showConcept(e.target.dataset.c);
    });

    // Desktop: show all phones
    if (window.innerWidth >= 860) {
      document.getElementById('single-view').style.display = 'none';
      const grid = document.getElementById('grid-view');
      grid.style.display = 'grid';
      Object.entries(concepts).forEach(([n, c]) => {
        grid.innerHTML += `
          <div>
            <p class="concept-label">${c.label}</p>
            <div class="phone-stage">
              <div class="phone">
                <div class="phone-notch"></div>
                <div class="phone-screen">${c.html}</div>
              </div>
            </div>
          </div>`;
      });
    } else {
      showConcept(1);
    }
  </script>
</body>
</html>
